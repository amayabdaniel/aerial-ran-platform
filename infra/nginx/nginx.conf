# nginx — single API entry point for the aerial-ran-platform control plane.
# Routes by URL path prefix to the 7 Go services running on the host.
# Inside a docker container, host.docker.internal points to the host's loopback.

worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Upstreams — all on the host's loopback, exposed via host.docker.internal.
    upstream iam        { server host.docker.internal:8081; }
    upstream subscriber { server host.docker.internal:8082; }
    upstream esim       { server host.docker.internal:8083; }
    upstream provision  { server host.docker.internal:8084; }
    upstream ranctl     { server host.docker.internal:8085; }
    upstream billing    { server host.docker.internal:8086; }
    upstream messaging  { server host.docker.internal:8087; }

    # Logging
    log_format json escape=json '{"time":"$time_iso8601","method":"$request_method","path":"$request_uri","status":$status,"upstream":"$upstream_addr","duration_ms":$request_time,"remote":"$remote_addr"}';
    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_set_header X-Device-ID       $http_x_device_id;

    server {
        listen 80;
        server_name _;

        # CORS preflight short-circuit (the services already handle CORS but
        # responding here makes browser perf a bit better)
        location / {
            return 404;
        }

        location = /healthz { return 200 'ok\n'; add_header Content-Type text/plain; }

        # Web UI (single-file static app served from /usr/share/nginx/html/ui).
        location = / { return 302 /ui/; }
        location /ui/ {
            alias /usr/share/nginx/html/ui/;
            index index.html;
        }

        # Routing by path. Each service exposes /v1/* — we map a prefix to it.
        location /api/iam/        { rewrite ^/api/iam/(.*)$        /$1 break; proxy_pass http://iam; }
        location /api/subscriber/ { rewrite ^/api/subscriber/(.*)$ /$1 break; proxy_pass http://subscriber; }
        location /api/esim/       { rewrite ^/api/esim/(.*)$       /$1 break; proxy_pass http://esim; }
        location /api/provision/  { rewrite ^/api/provision/(.*)$  /$1 break; proxy_pass http://provision; }
        location /api/ran/        { rewrite ^/api/ran/(.*)$        /$1 break; proxy_pass http://ranctl; }
        location /api/billing/    { rewrite ^/api/billing/(.*)$    /$1 break; proxy_pass http://billing; }

        # Messaging has a WebSocket — enable upgrade.
        location /api/messaging/ {
            rewrite ^/api/messaging/(.*)$ /$1 break;
            proxy_pass http://messaging;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 1h;
        }
    }
}
