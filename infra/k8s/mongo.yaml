# Standalone multi-arch MongoDB for Open5GS on arm64/k3d.
# Replaces the bundled Bitnami subchart (whose pinned tags are gone).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-mongodb
  namespace: ran
  labels:
    app.kubernetes.io/name: open5gs-mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: open5gs-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open5gs-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongodb
          readinessProbe:
            tcpSocket: { port: 27017 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 27017 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 50m,  memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-mongodb
  namespace: ran
  labels:
    app.kubernetes.io/name: open5gs-mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
  selector:
    app.kubernetes.io/name: open5gs-mongodb
